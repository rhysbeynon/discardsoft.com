<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discardsoft — Independent Game Studio</title>
  <meta name="description" content="Discardsoft, LLC — independent game studio. Coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">

<style>
/* ============================================================
   Discardsoft — BIOS-style landing page
   Palette (matched to the in-game "Twin Rivers" BIOS):
     - blue           primary surface
     - lavender pink  title bar + slim/secondary elements
     - faded yellow   selections, highlights, mouse-overs
     - red            destructive/irreversible actions ONLY
   ============================================================ */

:root {
  --bg: #0f1fc4;
  --ink: #ffffff;              /* text is white… */
  --ink-dim: rgba(255, 255, 255, 0.72); /* …or dimmed white */
  --lav: #d5aee2;              /* lavender is surfaces/borders only, never text */
  --yellow: #f1d69f;         /* warm tan highlight, sampled from the game */
  --yellow-ink: #000000;       /* …or black on lavender/yellow highlights */
  --danger: #d02f2f;
  --line: rgba(230, 235, 255, 0.7);
  --font: "VT323", "Courier New", monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; }

/* black backdrop behind the panes, like the CRT bezel */
body {
  background: #000;
  color: var(--ink);
  font-family: var(--font);
  font-size: 1.2rem;
  line-height: 1.45;
  letter-spacing: 0.03em;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

::selection { background: var(--yellow); color: var(--yellow-ink); }

/* ============ Title bar ============ */

.titlebar {
  background: var(--lav);
  color: var(--yellow-ink);
  font-size: 1.15rem;
  padding: 0.1rem 0.7rem;
  display: flex;
  justify-content: flex-end;
}

.titlebar .right { opacity: 0.7; }

/* ============ Main screen ============ */

/* blue pane on the black backdrop */
.screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem 1rem;
  gap: 0.9rem;
  background: var(--bg);
  border: 1px solid var(--line);
  margin: 0 4px;
}

.subtitle { color: var(--ink); }

.tagline {
  color: var(--ink-dim);
  max-width: 46ch;
  font-size: 1.05rem;
}

/* ============ Menu dialog ============ */

.dialog {
  margin-top: 1rem;
  width: min(380px, 100%);
  border: 1px solid var(--line);
  box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.35);
  text-align: left;
}

.dialog-title {
  padding: 0.05rem 0.55rem;
  border-bottom: 1px solid var(--line);
}

.menu { list-style: none; padding: 0.3rem 0; }

.menu a,
.menu .disabled {
  display: block;
  padding: 0.02rem 0.55rem;
  color: var(--ink);
  text-decoration: none;
}

/* BIOS menu highlight */
.menu a:hover, .menu a:focus-visible {
  background: var(--yellow);
  color: var(--yellow-ink);
  outline: none;
}

.menu .disabled { color: var(--ink-dim); opacity: 0.6; }

/* ============ Hint bar ============ */

.hintbar {
  background: var(--bg);
  border: 1px solid var(--line);
  margin: 0 4px 4px;
  padding: 0.35rem 0.7rem 0.55rem;
  font-size: 1.05rem;
  color: var(--ink-dim);
}

.hintbar p { line-height: 1.35; }
.hintbar .copyright { color: var(--ink-dim); }
</style>
</head>
<body>

  <header class="titlebar">
    <span class="right">www.discardsoft.com</span>
  </header>

  <main class="screen">
    <p class="subtitle">discardsoft</p>
    <p class="tagline">coming soon.</p>

    <div class="dialog">
      <p class="dialog-title">Main menu</p>
      <ul class="menu">
        <li><span class="disabled">Games</span></li>
        <li><a href="mailto:rhys@discardsoft.com">Contact — rhys@discardsoft.com</a></li>
        <li><span class="disabled">Press kit</span></li>
      </ul>
    </div>
  </main>

  <footer class="hintbar">
    <p class="copyright">© 2026 Discardsoft, LLC. All rights reserved.</p>
  </footer>

</body>
</html>
